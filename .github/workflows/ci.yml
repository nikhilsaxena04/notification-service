name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest

    - name: Test
      env:
        NS_REDIS_ADDR: localhost:6379
      run: go test -race -v ./...

  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build API Image
      run: docker build -t api-service:latest -f deployments/Dockerfile.api .

    - name: Build Worker Image
      run: docker build -t worker-service:latest -f deployments/Dockerfile.worker .

    - name: Build Router Image
      run: docker build -t router-service:latest -f deployments/Dockerfile.router .
