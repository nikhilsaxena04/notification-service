# ──────────────────────────────────────────────────────────────
# Local development infrastructure for the notification service.
# Usage: docker compose up -d
# ──────────────────────────────────────────────────────────────

services:
  # ── Redis v7.x (Queue + State) ───────────────────────────────
  redis:
    image: redis:latest
    container_name: ns-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Prometheus (Metrics) ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ns-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
  prometheus-data:
