# Prometheus scrape configuration for the notification service.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── api-service ────────────────────────────────────────────
  - job_name: "api-service"
    static_configs:
      - targets: ["api:8081"]
        labels:
          service: "api"

  # ── worker-service ─────────────────────────────────────────
  - job_name: "worker-service"
    static_configs:
      - targets: ["worker:8082"]
        labels:
          service: "worker"

  # ── notification-router ────────────────────────────────────
  - job_name: "notification-router"
    static_configs:
      - targets: ["router:8083"]
        labels:
          service: "router"
