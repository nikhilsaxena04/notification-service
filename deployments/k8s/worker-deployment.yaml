apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
    spec:
      containers:
      - name: worker-service
        image: worker-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8082
          name: metrics
        env:
        - name: NS_REDIS_ADDR
          value: "redis:6379"
        - name: NS_GRPC_PORT_ROUTER
          value: "router-service:50052"
        - name: NS_METRICS_PORT_WORKER
          value: "8082"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
